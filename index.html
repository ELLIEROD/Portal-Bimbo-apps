<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Bimbo Apps</title>
  
  <!-- CSS Principal -->
  <link rel="stylesheet" href="style.css">

  <!-- Ícones do App (Favicon, iOS e PWA) -->
  <link rel="icon" type="image/png" href="img/icon-192.png">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <header class="bimbo-header">
    <div class="logo-container">
      <h1 class="portal-title">
        <span class="text-blue">Portal</span>
        <img src="img/logo-bimbo.png" alt="Bimbo" class="header-logo-img">
        <span class="text-blue text-lowercase">apps</span>
      </h1>
      <p>Central de Ferramentas Operacionais</p>
    </div>
    <button id="btnInstall" class="btn-install" style="display: none;">Instalar Portal</button>
  </header>

  <!-- O grid onde os apps compactos vão renderizar -->
  <main class="app-grid" id="appGrid">
    <!-- Renderizado via JavaScript (app.js) -->
  </main>

  <footer class="portfolio-footer">
    <p>Desenvolvido por <span class="author-name">Ellie A. Rod - 50000833</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
