<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Bimbo Apps</title>
  
  <!-- CSS Principal -->
  <link rel="stylesheet" href="style.css">

  <!-- Ícones do App (Favicon, iOS e PWA) -->
  <link rel="icon" type="image/png" href="img/icon-192.png">
  <link rel="apple-touch-icon" href="img/icon-192.png">
  <link rel="manifest" href="manifest.json">
</head>
<body>
<!-- TELA DE ABERTURA (SPLASH SCREEN RESPONSIVA) -->
<div id="splash-screen" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #0f172a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999999; font-family: system-ui, -apple-system, sans-serif; transition: opacity 0.5s ease-out; pointer-events: auto;">
  <div style="text-align: center; color: #ffffff; padding: 20px; width: 100%; max-width: 500px;">
    
    <!-- ÍCONE RESPONSIVO -->
    <img src="./img/icon-512.png" alt="Logo" style="width: min(40vw, 28vh); height: auto; max-width: 220px; object-fit: contain; margin: 0 auto 20px auto; display: block;">
    
    <!-- TÍTULO E SUBTÍTULO DO APP -->
    <h1 style="font-size: clamp(1.4rem, 2.5vw, 2.2rem); font-weight: 800; color: #ffffff; margin: 0 0 8px 0; text-transform: uppercase; letter-spacing: -0.5px;">NOME DO APLICATIVO</h1>
    <p style="font-size: clamp(0.85rem, 1.2vw, 1.1rem); color: #94a3b8; margin: 0; font-weight: 400;">Slogan ou Descrição do App</p>
  </div>
</div>
  <header class="bimbo-header">
    <div class="logo-container">
      <h1 class="portal-title">
        <span class="text-blue">Portal</span>
        <img src="img/logo-bimbo.png" alt="Bimbo" class="header-logo-img">
        <span class="text-blue text-lowercase">apps</span>
      </h1>
      <p>Central de Ferramentas Operacionais</p>
    </div>
    <button id="btnInstall" class="btn-install" style="display: none;">Instalar Portal</button>
  </header>

  <!-- O grid onde os apps compactos vão renderizar -->
  <main class="app-grid" id="appGrid">
    <!-- Renderizado via JavaScript (app.js) -->
  </main>

  <footer class="portfolio-footer">
    <p>Desenvolvido por <span class="author-name">Ellie A. Rod - 50000833</span>
  </footer>

  <script src="app.js"></script>
  <!-- SCRIPT AUTÔNOMO DA SPLASH SCREEN -->
<script>
  (function() {
    function fecharSplash() {
      var splash = document.getElementById('splash-screen');
      if (splash) {
        splash.style.opacity = '0';
        splash.style.pointerEvents = 'none'; // Desativa cliques para não bloquear o app
        setTimeout(function() {
          splash.style.display = 'none';
        }, 500);
      }
    }

    // Executa o fechamento após 1.5 segundos
    setTimeout(fecharSplash, 1500);
  })();
</script>
</body>
</html>
