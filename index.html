<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal Bimbo Apps</title>
  <link rel="stylesheet" href="style.css
    <link rel="icon" type="image/png" href="img/icon-192.png">

  <link rel="apple-touch-icon" href="img/icon-192.png">
  
  <link rel="manifest" href="manifest.json">
</head>
<body>

  <header class="bimbo-header">
  <div class="logo-container">
    <h1 class="portal-title">
      <span class="text-blue">Portal</span>
      <img src="img/logo-bimbo.png" alt="Bimbo" class="header-logo-img">
      <span class="text-blue text-lowercase">apps</span>
    </h1>
    <p>Central de Ferramentas Operacionais</p>
  </div>
  <button id="btnInstall" class="btn-install" style="display: none;">Instalar Portal</button>
</header>


  <!-- O grid onde os apps compactos vão renderizar -->
  <main class="app-grid" id="appGrid">
    <!-- Exemplo de como o JS vai renderizar cada card compacto:
    <a href="./seu-app/index.html" class="app-card">
      <div class="icon-wrapper">
        <img src="img/icone-app.png" alt="App" class="app-icon">
      </div>
      <h3>Nome do App</h3>
    </a> 
    -->
  </main>

  <footer class="portfolio-footer">
    <p>Desenvolvido por <span class="author-name">Seu Nome</span> | Portfólio Técnico</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
